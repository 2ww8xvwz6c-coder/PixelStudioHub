<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join | Pixel Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="login.html">Login</a></li>
    </ul>
</nav>

<header>
    <h1>Join Our Artists</h1>
</header>

<main>
    <form action="#">
        <label>Username:</label>
        <input type="text" required placeholder="Choose a username">

        <label>E-mail:</label>
        <input type="email" required placeholder="you@example.com">

        <label>Password:</label>
        <input type="password" required placeholder="********">

        <label>Confirm Password:</label>
        <input type="password" required placeholder="********">

        <label>Gender</label>
        <div style="margin: 1px 0 25px; display: flex; gap: 20px;">
            <label style="display:inline; text-transform: none; font-size: 0.9rem;" for="free"><input type="radio" name="acc" id="male" checked> Male</label>
            <label style="display:inline; text-transform: none; font-size: 0.9rem;" for="pro"><input type="radio" name="acc" id="female"> Female</label>
        </div>

        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob" max="2008-04-09" required>
        
        <label>Interests</label>
        <div style="margin: 1px 0 25px; display: flex; gap: 20px;">
            <label style="text-transform: none; font-size: 0.9rem;"><input type="checkbox"> Sprites</label>
            <label style="text-transform: none; font-size: 0.9rem;"><input type="checkbox"> Backgrounds</label>
            <label style="text-transform: none; font-size: 0.9rem;"><input type="checkbox"> Wallpapers</label>
        </div>

        <button type="submit">Register</button>
    </form>
</main>
<script src="script.js"></script>
</body>
</html>
