<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pixel Studio | Login</title>

    <style>
        .signup-text { text-align: center; margin-top: 15px; font-size: 0.95rem; }
        .signup-link { color: #d4af37; text-decoration: none; font-weight: 600; }
        .signup-link:hover { text-decoration: underline; }
    </style>

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-bg">

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="login.html" class="active">Login</a></li>
        </ul>
    </nav>

    <header>
        <h1>Login</h1>
    </header>

    <main>
        <form action="#" method="post">
            <label for="email">Username:</label>
            <input type="text" placeholder="Enter your username">

            <label for="password">Password:</label>
            <input type="password" placeholder="Enter your password">

            <input type="submit" value="Login">

            <p class="signup-text">Don't have an account? <a href="signup.html" class="signup-link">Sign up here</a></p>
        </form>
    </main>
<script src="script.js"></script>
</body>
</html>
